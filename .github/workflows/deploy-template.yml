name: Build Image and Deploy Coder Template

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional Docker image tag. Defaults to the short commit SHA."
        required: false
        type: string
      template_name:
        description: "Coder template name to push."
        required: false
        default: docker-desktop
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-coder-template
  cancel-in-progress: false

env:
  DOCKERHUB_USERNAME: rosssearle
  IMAGE_NAME: rosssearle/ubuntu-desktop
  CODER_URL: https://coder.rosssearle.com
  TEMPLATE_DIR: template
  DEFAULT_TEMPLATE_NAME: main-docker

jobs:
  build-and-deploy:
    name: Build Docker image and deploy template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deployment values
        id: values
        shell: bash
        run: |
          set -euo pipefail

          image_tag="${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}"
          if [ -z "$image_tag" ]; then
            image_tag="${GITHUB_SHA::12}"
          fi

          template_name="${{ github.event_name == 'workflow_dispatch' && inputs.template_name || '' }}"
          if [ -z "$template_name" ]; then
            template_name="$DEFAULT_TEMPLATE_NAME"
          fi

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "template_name=$template_name" >> "$GITHUB_OUTPUT"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install NativeAOT build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang zlib1g-dev

      - name: Publish ex CLI for Linux
        shell: bash
        run: |
          set -euo pipefail
          dotnet publish tools/ex/ex.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishAot=true \
            -p:StripSymbols=true \
            -o /tmp/ex-linux-x64
          install -m 0755 /tmp/ex-linux-x64/ex "$TEMPLATE_DIR/image-assets/ex"
          test -x "$TEMPLATE_DIR/image-assets/ex"
          ls -lh "$TEMPLATE_DIR/image-assets/ex"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push desktop image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.TEMPLATE_DIR }}
          file: ./${{ env.TEMPLATE_DIR }}/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.values.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Point template at pushed image
        shell: bash
        run: |
          set -euo pipefail
          image="${IMAGE_NAME}:${{ steps.values.outputs.image_tag }}"
          sed -i -E "s#image_name[[:space:]]+= \".*\"#image_name     = \"$image\"#" "$TEMPLATE_DIR/main.tf"
          grep 'image_name' "$TEMPLATE_DIR/main.tf"

      - name: Normalize Coder secrets
        id: coder
        shell: bash
        env:
          RAW_CODER_URL: ${{ env.CODER_URL }}
          RAW_CODER_ACCESS_TOKEN: ${{ secrets.CODER_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          coder_url="$(printf '%s' "$RAW_CODER_URL" | tr -d '\r\n' | sed -E 's#[[:space:]]+$##; s#/$##')"
          if [ -z "$coder_url" ]; then
            echo "CODER_URL secret is empty." >&2
            exit 1
          fi

          case "$coder_url" in
            http://*|https://*) ;;
            *)
              echo "CODER_URL must start with http:// or https://." >&2
              exit 1
              ;;
          esac

          token_length="$(printf '%s' "$RAW_CODER_ACCESS_TOKEN" | wc -c | tr -d ' ')"
          if [ "$token_length" -eq 0 ]; then
            echo "CODER_ACCESS_TOKEN secret is empty." >&2
            exit 1
          fi

          echo "::add-mask::$coder_url"
          echo "url=$coder_url" >> "$GITHUB_OUTPUT"

      - name: Set up Coder CLI
        uses: coder/setup-action@v1
        with:
          access_url: ${{ steps.coder.outputs.url }}
          coder_session_token: ${{ secrets.CODER_ACCESS_TOKEN }}

      - name: Deploy Coder template
        shell: bash
        run: |
          set -euo pipefail
          coder templates push "${{ steps.values.outputs.template_name }}" \
            --directory "$TEMPLATE_DIR" \
            --yes \
            --ignore-lockfile \
            --name "${{ steps.values.outputs.image_tag }}" \
            --message "Deploy $IMAGE_NAME:${{ steps.values.outputs.image_tag }}"
